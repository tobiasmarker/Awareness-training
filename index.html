<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Awareness Training</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:
radial-gradient(circle at top left,rgba(102,161,221,.12) 0,transparent 24%),
radial-gradient(circle at top right,rgba(23,59,103,.08) 0,transparent 28%),
linear-gradient(180deg,rgba(245,249,253,.98) 0,rgba(236,243,249,.96) 100%),
repeating-linear-gradient(90deg,rgba(23,59,103,.025) 0,rgba(23,59,103,.025) 1px,transparent 1px,transparent 96px);
color:#1b2f43;min-height:100vh;position:relative}
header{background:linear-gradient(135deg,#102945 0,#18385f 42%,#255181 100%);color:white;padding:20px 42px;display:flex;align-items:center;justify-content:space-between;gap:14px;box-shadow:0 16px 42px rgba(9,27,46,.2);position:sticky;top:0;z-index:100;border-bottom:1px solid rgba(255,255,255,.08);backdrop-filter:blur(8px)}
.header-copy{display:flex;align-items:center}
.header-tools{display:flex;align-items:center;gap:12px}
.header-meta{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end}
.header-pill{padding:8px 13px;border:1px solid rgba(255,255,255,.18);border-radius:999px;font-size:11px;background:rgba(255,255,255,.08);letter-spacing:.7px;text-transform:uppercase}
.theme-toggle{padding:10px 14px;border:1px solid rgba(255,255,255,.18);border-radius:999px;font-size:11px;background:rgba(255,255,255,.08);letter-spacing:.8px;text-transform:uppercase;color:#fff;font-weight:800;cursor:pointer;transition:background .18s,border-color .18s,transform .18s,box-shadow .18s}
.theme-toggle:hover{background:rgba(255,255,255,.14);border-color:rgba(255,255,255,.28);transform:translateY(-1px);box-shadow:0 10px 20px rgba(6,18,31,.16)}
.theme-toggle:focus-visible{outline:3px solid rgba(255,255,255,.28);outline-offset:3px}
.score-panel{padding:18px;background:linear-gradient(180deg,#f9fcff 0,#eef5fb 100%);border-top:1px solid #e4eef8;border-bottom:1px solid #e4eef8;position:relative;overflow:hidden}
.score-panel:before{content:"";position:absolute;right:-30px;top:-32px;width:120px;height:120px;border-radius:50%;background:rgba(44,116,182,.08)}
.score-panel > *{position:relative}
.score-panel-label{font-size:12px;text-transform:uppercase;letter-spacing:1px;color:#55708d;font-weight:700;margin-bottom:10px}
.score-panel-points{display:flex;align-items:baseline;gap:8px;margin-bottom:12px}
.score-panel-points strong{font-size:40px;line-height:1;color:#173b67;letter-spacing:-1px}
.score-panel-points span{font-size:12px;color:#6d86a2;text-transform:uppercase;letter-spacing:.8px;font-weight:700}
.score-status{display:inline-flex;align-items:center;justify-content:center;padding:10px 13px;border-radius:999px;font-size:11px;font-weight:800;letter-spacing:.9px;text-transform:uppercase;border:1px solid transparent;box-shadow:0 8px 18px rgba(31,69,108,.08)}
.score-status.low{background:#fdf2f2;color:#a63a32;border-color:#efc4c0}
.score-status.mid{background:#fff7e7;color:#9a6a00;border-color:#f0d28d}
.score-status.high{background:#ebfaf1;color:#187346;border-color:#b7e4c8}
.logo{font-family:Georgia,'Times New Roman',serif;font-size:24px;font-weight:700;letter-spacing:.8px}.subtitle{font-size:12px;opacity:.78;margin-top:4px;letter-spacing:1.1px;text-transform:uppercase}
.layout{display:flex;max-width:1220px;margin:0 auto;padding:34px 24px;gap:30px;align-items:flex-start}
.sidebar{width:260px;flex-shrink:0;position:sticky;top:80px}
.sidebar-card{background:rgba(255,255,255,.92);backdrop-filter:blur(10px);border-radius:20px;overflow:hidden;box-shadow:0 28px 64px rgba(20,50,84,.12);border:1px solid rgba(26,58,107,.08);position:relative}
.sidebar-card:before{content:"";position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,rgba(255,255,255,.8),rgba(255,255,255,0))}
.sidebar-header{background:linear-gradient(135deg,#17365a,#234b79);color:white;padding:17px 18px 14px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;position:relative}
.sidebar-header:after{content:"";position:absolute;left:18px;bottom:0;width:72px;height:3px;border-radius:999px;background:rgba(255,255,255,.28)}
.sidebar-sub{font-size:11px;opacity:.72;font-weight:500;letter-spacing:.6px;text-transform:none;margin-top:4px}
#menu{padding:14px}
.menu-group{margin-bottom:14px;padding:10px;border:1px solid #e7eff8;border-radius:18px;background:linear-gradient(180deg,rgba(251,253,255,.92) 0,rgba(244,248,252,.88) 100%)}
.menu-group:last-child{margin-bottom:0}
.menu-group-head{padding:8px 8px 12px}
.menu-group-title{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:#1f456c}
.menu-group-copy{font-size:12px;color:#6f88a2;line-height:1.45;margin-top:3px}
.menu-group-body{display:flex;flex-direction:column;gap:9px}
.menu-item{padding:14px 14px 14px 16px;border:1px solid #e2ebf5;border-radius:16px;cursor:pointer;display:flex;align-items:center;gap:12px;font-size:14px;transition:background .15s,border-color .15s,transform .15s,box-shadow .15s;margin-bottom:0;background:rgba(255,255,255,.78);position:relative;overflow:hidden}
.menu-item:before{content:"";position:absolute;left:0;top:10px;bottom:10px;width:4px;border-radius:999px;background:transparent;transition:background .15s}
.menu-item:hover:not(.locked):not(.csoon){background:#f0f6ff;border-color:#d8e6f5;transform:translateY(-1px);box-shadow:0 10px 20px rgba(38,81,129,.07)}
.menu-item:hover:not(.locked):not(.csoon):before{background:#9fc4ea}
.menu-item.active{background:linear-gradient(90deg,#edf4fd 0,#f8fbff 100%);border:1px solid #cfe0f2;box-shadow:0 12px 24px rgba(33,78,126,.10);font-weight:600;color:#1a3a6b}
.menu-item.active:before{background:linear-gradient(180deg,#1e4978,#2f77bc)}
.menu-item.locked,.menu-item.csoon{opacity:.55;cursor:not-allowed;background:#f9fbfd}
.menu-icon{font-size:14px;width:34px;height:34px;border-radius:12px;display:flex;align-items:center;justify-content:center;text-align:center;flex-shrink:0;background:#edf4fb;color:#1b4975;border:1px solid #d7e6f4;box-shadow:inset 0 1px 0 rgba(255,255,255,.75)}
.menu-item.active .menu-icon{background:linear-gradient(135deg,#173b67,#2d6faf);color:#fff;border-color:transparent}
.menu-label{flex:1;line-height:1.3}
.menu-label strong{display:block;font-size:14px;color:#18395f;margin-bottom:3px}
.menu-desc{font-size:12px;color:#8a9bb0}
.mbadge{font-size:10px;font-weight:800;padding:5px 9px;border-radius:999px;text-transform:uppercase;letter-spacing:.5px;align-self:flex-start;box-shadow:0 6px 12px rgba(22,56,95,.06)}
.bl{background:#e8ecf0;color:#8a9bb0}.bs{background:#fff3cd;color:#856404}
.bd{background:#d1f5e0;color:#1a7a42}.bn{background:#ddeeff;color:#1a3a6b}
.prog-sum{padding:16px 18px;background:linear-gradient(180deg,#f9fbfd 0,#f2f7fb 100%);border-top:1px solid #eef2f7;font-size:12px;color:#5d7a9a}
.sim-host{padding:0;background:transparent;border:none;box-shadow:none;margin-top:24px}
.side-note{padding:16px 18px;background:#f4f8fc;border-top:1px solid #eef2f7;position:relative}
.side-note h3{font-size:12px;text-transform:uppercase;letter-spacing:.8px;color:#1a3a6b;margin-bottom:8px}
.side-note p{font-size:13px;line-height:1.6;color:#55718e}
.side-note:before{content:"";position:absolute;left:18px;top:0;width:56px;height:3px;border-radius:999px;background:rgba(46,125,209,.22)}
.side-note.demo{background:#fbfcfe}
.side-note.demo h3{color:#24486f}
.prog-bar-wrap{height:5px;background:#dde8f5;border-radius:3px;margin-top:6px;overflow:hidden}
.prog-bar-fill{height:100%;background:linear-gradient(90deg,#1a3a6b,#2e7dd1);border-radius:3px;transition:width .4s}
.main{flex:1;min-width:0}
.card{background:rgba(255,255,255,.94);border-radius:22px;padding:38px;box-shadow:0 24px 56px rgba(23,55,90,.10);margin-bottom:22px;border:1px solid rgba(24,56,95,.08)}
.hero{padding:46px;background:
linear-gradient(135deg,#f8fbff 0,#eff5fb 56%,#e7f0f8 100%);
position:relative;overflow:hidden}
.hero:before,.hero:after{content:"";position:absolute;border-radius:50%;background:rgba(43,122,203,.07)}
.hero:before{width:280px;height:280px;right:-90px;top:-100px}
.hero:after{width:220px;height:220px;left:-110px;bottom:-110px}
.hero > *{position:relative}
.hero-title{max-width:760px}
.hero-actions{display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-top:10px}
.hero-note{font-size:13px;color:#5f7893;max-width:720px;margin-top:6px}
.slabel{font-size:11px;font-weight:700;color:#2e7dd1;text-transform:uppercase;letter-spacing:1.8px;margin-bottom:10px}
.pbar-c{background:#dde8f5;border-radius:6px;height:8px;margin-bottom:24px;overflow:hidden}
.pbar{height:100%;background:linear-gradient(90deg,#1a3a6b,#2e7dd1);border-radius:6px;transition:width .4s}
h1{font-family:Georgia,'Times New Roman',serif;font-size:34px;color:#163757;margin-bottom:14px;line-height:1.18;font-weight:700}
h2{font-family:Georgia,'Times New Roman',serif;font-size:24px;color:#163757;margin-bottom:14px}
p{font-size:15px;line-height:1.78;color:#32485d;margin-bottom:12px}
.sbox{background:linear-gradient(180deg,#f7fbfe 0,#f1f7fc 100%);border-left:4px solid #2e7dd1;border-radius:12px;padding:18px 22px;margin:18px 0;font-size:14.5px;line-height:1.7;box-shadow:inset 0 1px 0 rgba(255,255,255,.6)}
.sbox .from{font-weight:700;color:#1a3a6b;margin-bottom:10px;font-size:12px;text-transform:uppercase;border-bottom:1px solid #dde8f5;padding-bottom:8px}
.question{font-size:16px;font-weight:600;color:#1a3a6b;margin:22px 0 14px;line-height:1.4}
.qnum{font-size:12px;font-weight:700;color:#2e7dd1;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.options{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
.opt{background:white;border:2px solid #dde8f5;border-radius:12px;padding:14px 18px;font-size:14.5px;color:#1a2b45;cursor:pointer;text-align:left;transition:all .18s;line-height:1.5;box-shadow:0 6px 16px rgba(29,63,101,.04)}
.opt:hover{border-color:#2e7dd1;background:#f0f6ff;transform:translateY(-1px);box-shadow:0 12px 24px rgba(29,63,101,.08)}
.opt.c{border-color:#27ae60;background:#eafaf1;color:#1a6b3a;font-weight:600;cursor:default}
.opt.w{border-color:#e74c3c;background:#fdf2f2;color:#922b21;cursor:default}
.opt.d{opacity:.45;cursor:default}
.fb{border-radius:12px;padding:16px 20px;margin:14px 0;font-size:14.5px;line-height:1.65}
.fb.c{background:#eafaf1;border-left:4px solid #27ae60;color:#1a6b3a}
.fb.w{background:#fdf2f2;border-left:4px solid #e74c3c;color:#922b21}
.fbt{font-weight:700;font-size:15px;margin-bottom:5px}
.why{background:#fffbf0;border-left:4px solid #f39c12;border-radius:12px;padding:14px 18px;margin-top:12px;font-size:14px;color:#7d5a00;line-height:1.65}
.whyt{font-weight:700;margin-bottom:4px}
.mini-stats{display:flex;gap:12px;flex-wrap:wrap;margin:0 0 18px}
.mini-stat{background:#f4f8fc;border:1px solid #dce8f4;border-radius:12px;padding:12px 14px;min-width:150px}
.mini-stat strong{display:block;font-size:22px;color:#173b67}
.mini-stat span{font-size:12px;color:#6985a4;text-transform:uppercase;font-weight:700;letter-spacing:.7px}
.divider{border:none;border-top:1px solid #eef2f7;margin:22px 0}
.btn{background:linear-gradient(135deg,#173b67,#285f98);color:white;border:none;border-radius:14px;padding:13px 28px;font-size:14px;font-weight:700;letter-spacing:.2px;cursor:pointer;transition:background .2s,transform .15s,box-shadow .15s;margin-top:6px;box-shadow:0 12px 24px rgba(23,59,103,.16)}
.btn:hover{background:linear-gradient(135deg,#1b4a80,#2f73b5);transform:translateY(-1px);box-shadow:0 16px 28px rgba(26,58,107,.22)}
.btn[disabled]{opacity:.65;cursor:not-allowed;transform:none;box-shadow:none}
.btn.secondary{background:white;color:#1a3a6b;border:1px solid #c8daee;box-shadow:0 6px 16px rgba(26,58,107,.05)}
.btn.secondary:hover{background:#f6f9fc;box-shadow:0 10px 18px rgba(26,58,107,.08)}
.btn-row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.email-status{font-size:13px;line-height:1.6;margin-top:14px;min-height:22px;color:#5d7a9a}
.email-status.info{color:#315a84}
.email-status.ok{color:#1a7a42}
.email-status.err{color:#a63a32}
.feedback-grid{display:grid;gap:16px;margin:22px 0}
.feedback-card{padding:22px;border-radius:18px;background:linear-gradient(180deg,#fbfdff 0,#f4f8fc 100%);border:1px solid #deeaf6;box-shadow:0 12px 26px rgba(25,61,99,.05)}
.feedback-card h3{font-size:15px;color:#173b67;margin-bottom:8px}
.feedback-card p{font-size:14px;color:#5c7691;line-height:1.65;margin:0}
.star-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
.star-btn{width:46px;height:46px;border-radius:14px;border:1px solid #d8e5f2;background:#fff;color:#9bb0c7;font-size:22px;line-height:1;cursor:pointer;transition:transform .15s,box-shadow .15s,border-color .15s,background .15s}
.star-btn:hover{transform:translateY(-1px);border-color:#7aa8d5;box-shadow:0 10px 20px rgba(26,58,107,.08)}
.star-btn.on{background:#fff4d8;border-color:#f0c96f;color:#c88700;box-shadow:0 12px 22px rgba(201,146,34,.16)}
.star-btn:focus-visible,.comment-box:focus-visible{outline:3px solid rgba(43,122,203,.28);outline-offset:3px}
.comment-box{width:100%;min-height:140px;border-radius:16px;border:1px solid #d8e5f2;background:#fff;padding:16px 18px;font:inherit;font-size:14px;line-height:1.7;color:#1f3550;resize:vertical;box-shadow:inset 0 1px 0 rgba(255,255,255,.65)}
.feedback-note{font-size:13px;color:#6b86a1;margin-top:8px}
.top-actions{display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:18px}
.top-actions .hint{font-size:12px;color:#6c86a3}
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:24px}
.stat-box{background:rgba(255,255,255,.88);border:1px solid rgba(22,59,103,.08);border-radius:14px;padding:18px;box-shadow:inset 0 1px 0 rgba(255,255,255,.55)}
.stat-box strong{display:block;font-size:28px;color:#173b67;margin-bottom:6px}
.stat-box span{font-size:12px;text-transform:uppercase;letter-spacing:.8px;color:#6484a5;font-weight:700}
.twocol{display:grid;grid-template-columns:1.15fr .85fr;gap:18px;margin-top:20px}
.infocard{background:linear-gradient(180deg,#fbfdff 0,#f5f9fc 100%);border:1px solid #e0ebf7;border-radius:16px;padding:22px;box-shadow:0 10px 24px rgba(27,62,101,.04)}
.infocard h3{font-size:14px;color:#1a3a6b;text-transform:uppercase;letter-spacing:.9px;margin-bottom:10px}
.section-showcase{display:grid;grid-template-columns:1.1fr .9fr;gap:18px;margin-top:24px;align-items:stretch}
.journey-card{background:linear-gradient(180deg,#fbfdff 0,#f5f9fc 100%);border:1px solid #dfebf7;border-radius:20px;padding:24px;box-shadow:0 16px 30px rgba(27,62,101,.06);position:relative;overflow:hidden}
.journey-card:before{content:"";position:absolute;right:-36px;top:-46px;width:140px;height:140px;border-radius:50%;background:rgba(46,125,209,.05)}
.journey-card > *{position:relative}
.journey-card h3{font-size:14px;color:#1a3a6b;text-transform:uppercase;letter-spacing:.9px;margin-bottom:12px}
.journey-list{display:grid;gap:10px}
.journey-step{display:flex;gap:14px;align-items:flex-start;padding:13px 0;border-bottom:1px solid #e8f0f7}
.journey-step:last-child{border-bottom:none;padding-bottom:0}
.journey-num{width:34px;height:34px;border-radius:999px;background:linear-gradient(180deg,#edf4fc 0,#dfeefc 100%);color:#1a4671;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0;border:1px solid #d6e6f6}
.journey-copy strong{display:block;font-size:14px;color:#173b67;margin-bottom:4px}
.journey-copy span{font-size:13px;color:#617b95;line-height:1.55}
.demo-card{background:linear-gradient(145deg,#f8fbff 0,#edf4fb 56%,#e6f0f9 100%);border:1px solid #dbe8f4;border-radius:20px;padding:26px;position:relative;overflow:hidden;box-shadow:0 18px 38px rgba(27,62,101,.08)}
.demo-card:before{content:"";position:absolute;right:-18px;top:-18px;width:120px;height:120px;border-radius:50%;background:rgba(44,116,182,.08)}
.demo-card:after{content:"";position:absolute;left:-30px;bottom:-50px;width:180px;height:120px;border-radius:999px;background:rgba(23,59,103,.04);transform:rotate(-8deg)}
.demo-card > *{position:relative}
.demo-kicker{display:inline-flex;padding:6px 10px;border-radius:999px;background:#ffffffd9;border:1px solid #d8e6f4;font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:#214a74;margin-bottom:12px;box-shadow:0 8px 18px rgba(28,67,109,.08)}
.demo-card h3{font-family:Georgia,'Times New Roman',serif;font-size:24px;color:#17385f;margin-bottom:10px}
.demo-card p{font-size:14px;color:#4f6b86;line-height:1.72}
.demo-points{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px;margin-bottom:18px}
.demo-point{padding:8px 12px;border-radius:999px;background:#fff;border:1px solid #d9e6f4;font-size:12px;color:#315170;font-weight:700;box-shadow:0 6px 14px rgba(28,67,109,.05)}
.checklist{list-style:none}
.checklist li{padding:8px 0 8px 28px;position:relative;font-size:14.5px;line-height:1.6;color:#27435d}
.checklist li:before{content:"\2713";position:absolute;left:0;top:8px;font-weight:700;color:#1f8a4c}
.tag{display:inline-block;border-radius:20px;padding:5px 12px;font-size:10px;font-weight:700;margin-bottom:12px;text-transform:uppercase;letter-spacing:1px;background:#fff3e0;color:#b86b00}
.wlist{list-style:none;margin:16px 0}
.wlist li{padding:10px 0;border-bottom:1px solid #eef2f7;display:flex;align-items:flex-start;gap:12px;font-size:14.5px}
.wlist li:last-child{border-bottom:none}
.scores{display:flex;gap:16px;margin:22px 0;flex-wrap:wrap}
.scard{flex:1;min-width:120px;background:linear-gradient(180deg,#f8fbfe 0,#f2f7fb 100%);border-radius:16px;padding:20px;text-align:center;border:1px solid #e0ebf7;box-shadow:0 8px 20px rgba(25,61,99,.05)}
.snum{font-size:44px;font-weight:800;color:#1a3a6b;line-height:1}
.slbl{font-size:12px;color:#5d7a9a;margin-top:5px;font-weight:600;text-transform:uppercase}
.imp{color:#27ae60}.neg{color:#e74c3c}.neu{color:#f39c12}
.rmsg{background:#eef4ff;border-radius:14px;padding:18px 22px;margin:18px 0;border-left:4px solid #2e7dd1}
.hgrid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:24px 0}
.htile{border-radius:20px;padding:24px;transition:transform .15s,box-shadow .15s,border-color .15s;background:#fff;border:1px solid #e0ebf7;box-shadow:0 14px 28px rgba(29,63,101,.06);position:relative;overflow:hidden}
.htile:before{content:"";position:absolute;left:22px;top:0;width:56px;height:4px;border-radius:999px;background:rgba(46,125,209,.18)}
.htile.clickable{cursor:pointer}
.htile.clickable:hover{transform:translateY(-3px);box-shadow:0 16px 28px rgba(26,58,107,.14)}
.htile.blue{background:linear-gradient(135deg,#17385f,#28598e);color:white;border-color:transparent}
.htile.blue:before{background:rgba(255,255,255,.3)}
.htile.light{background:linear-gradient(180deg,#f5f9fd,#eef5fb);border-color:#dde8f5}
.htile.dim{opacity:.45;cursor:not-allowed}
.htile.green{background:#eafaf1;border-color:#a9dfbf}
.meta-row{display:flex;gap:10px;flex-wrap:wrap;margin:12px 0 16px}
.meta-chip{display:inline-flex;align-items:center;gap:8px;padding:8px 12px;border-radius:999px;background:#f0f6ff;color:#1a3a6b;font-size:11px;font-weight:700;border:1px solid #d7e7f8;text-transform:uppercase;letter-spacing:.7px}
.scenario-top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;flex-wrap:wrap}
.flag-list{display:flex;flex-direction:column;gap:10px;margin:18px 0}
.flag-line{width:100%;text-align:left;padding:14px 16px;border-radius:14px;border:2px solid #dde8f5;background:#fff;font-size:14.5px;line-height:1.55;cursor:pointer;transition:all .18s;box-shadow:0 6px 16px rgba(29,63,101,.04)}

var SC=[{"id": 1, "at": "Calendar Invite Trap", "title": "Mandatory Compliance Review", "setup": "You arrive at work to find a calendar invite titled Updated Compliance Policy - Mandatory Review. It appears to come from the internal HR distribution list and contains a link to an external document. The deadline is end of week.", "from": "Calendar Invite - HR Distribution List", "body": ["All staff must review the updated compliance policy before end of week.", "", "Click the link below to access the document: [View Policy Document]", "", "Failure to complete by Friday may result in a compliance flag on your record.", "HR Team"], "qs": [{"n": "Question 1 of 2 - Decision", "q": "The invite looks internal and the deadline creates urgency. What do you do?", "o": ["Click the link - it came from the HR distribution list", "Check the sender's actual email address and access the document via the official company intranet instead of clicking the link", "Accept the invite and click the link later", "Forward it to a colleague to confirm then click the link"], "c": 1, "cf": "Correct. Verifying the sender address and using official internal systems rather than clicking unknown links is the right response.", "wf": "This is a calendar invite trap. The invite was sent from a spoofed address designed to look like HR."}, {"n": "Question 2 of 2 - Understanding", "q": "What made this attack particularly convincing?", "o": ["The format - calendar invites feel less suspicious than emails and routine deadlines reduce critical thinking", "The attacker knew your name", "The link looked legitimate", "The invite came on a Monday morning"], "c": 0, "cf": "Correct. Calendar invites feel routine and safe. Combined with a compliance deadline creating urgency, this format is designed to bypass critical thinking.", "wf": "The key factor is the format itself - calendar invites feel internal and routine, which is exactly why attackers use them."}], "why": "Calendar invites feel less suspicious than emails. Compliance deadlines create urgency that discourages careful verification."}, {"id": 2, "at": "Internal Chat Impersonation", "title": "Urgent File Request via Teams", "setup": "A Microsoft Teams message arrives from what appears to be a colleague you work with regularly. Their name and profile picture match exactly. They need urgent help before a client presentation.", "from": "Teams Message - James Wilson (Finance Team)", "body": ["Hey - really sorry to bother you. I am locked out of the shared drive and presenting to the client in 5 minutes.", "", "Could you quickly send me the Q3 client report from Finance > Client Reports? I will explain later, just really need it now. Thanks."], "qs": [{"n": "Question 1 of 2 - Decision", "q": "The name and photo match your colleague and the urgency feels real. What do you do?", "o": ["Send the file immediately - you recognise James and he needs it", "Send a read-only version to be cautious", "Pause and verify - call James on his known number or ask something only he would know before sending anything", "Tell him to contact IT support himself"], "c": 2, "cf": "Correct. Verifying identity through a separate channel before sharing sensitive files is always the right response, regardless of how convincing the request appears.", "wf": "Internal accounts can be compromised or cloned. A matching name and photo do not confirm identity."}, {"n": "Question 2 of 2 - Understanding", "q": "Which two psychological triggers does this attack primarily exploit?", "o": ["Fear and scarcity", "Urgency and the perceived safety of internal tools", "Authority and reciprocity", "Curiosity and greed"], "c": 1, "cf": "Correct. The 5-minute deadline creates urgency, and the Teams platform feels inherently safe - both reduce critical thinking.", "wf": "The key triggers are urgency and the false sense of security from internal communication platforms."}], "why": "Internal tools feel safe. Urgency reduces critical thinking. The familiar name and photo and processes to make the scenario plausible."}, {"id": 4, "at": "Email Thread Hijack", "title": "The Changed Bank Details", "setup": "You are in an ongoing email thread with a real vendor you have worked with for over a year. The conversation is about an upcoming invoice. A new reply arrives requesting a payment detail change.", "from": "RE: Invoice 4471 - Mark, Greenfield Supplies", "body": ["Hi,", "Just a quick note before we process this one - we have recently changed our banking provider. Please update your records with the new details below.", "", "Bank: First National | Sort Code: 20-44-18 | Account: 73829104", "", "Thanks as always for the prompt payments! Best, Mark - Greenfield Supplies Accounts"], "qs": [{"n": "Question 1 of 2 - Decision", "q": "The email is in the existing thread, uses the right name and tone, and looks completely legitimate. What do you do?", "o": ["Update the banking details - this is clearly the same vendor", "Reply to the email to confirm before updating", "Call the vendor using a phone number you already have on file - not one in this email", "Forward to your manager to approve"], "c": 2, "cf": "Correct. Banking detail changes must always be verified by calling a known contact number - not by replying to the suspicious email or using any details within it.", "wf": "Attackers compromise real email accounts and continue real conversations. The existing thread gives false legitimacy."}, {"n": "Question 2 of 2 - Understanding", "q": "Why does replying to the email to confirm the details NOT protect you?", "o": ["Email replies are not legally binding", "The attacker controls the email account and will confirm their own fraudulent details", "Email replies are too slow", "The vendor may not check their email promptly"], "c": 1, "cf": "Correct. If the attacker has compromised the vendor email account they will receive and respond to your confirmation - making the verification completely worthless.", "wf": "Replying to a compromised email just asks the attacker to confirm their own fraud. Only out-of-band verification is reliable."}], "why": "The existing thread and correct tone create a powerful false sense of legitimacy. Attackers specifically compromise real accounts to exploit existing trust."}, {"id": 5, "at": "MFA Fatigue Attack", "title": "The Endless Push Notifications", "setup": "It is 10pm. You receive repeated MFA push notification requests you did not initiate - one after another. After the fifth notification an SMS arrives from what appears to be IT Support.", "from": "SMS - IT Support", "body": ["Hi, this is IT Support. We are doing emergency system maintenance tonight and there is a sync loop causing repeated MFA requests to your device.", "", "To clear the loop, please approve the next request when it comes through. Sorry for the inconvenience - should take about 30 seconds."], "qs": [{"n": "Question 1 of 2 - Decision", "q": "The notifications are annoying and the IT explanation sounds plausible. What do you do?", "o": ["Approve the next request - the IT explanation makes sense", "Approve just one to see if it clears the loop", "Ignore the notifications until morning", "Reject all MFA requests and report it to your IT security team immediately - do not approve anything"], "c": 3, "cf": "Correct. Unexpected MFA requests you did not initiate mean someone has your credentials and is actively trying to get in. The SMS is part of the attack. Report immediately.", "wf": "This is an MFA fatigue attack. The attacker has your credentials and is hoping you approve one notification just to make it stop."}, {"n": "Question 2 of 2 - Understanding", "q": "What should you do if you accidentally approve an MFA request you did not initiate?", "o": ["Nothing - approving it just logs you in", "Change your password the next morning", "Report it to IT security immediately and assume your account may be compromised", "Log out of all devices and wait"], "c": 2, "cf": "Correct. Approving an unsolicited MFA req     b.type="button";b.className=cl;b.textContent=o;
    if(!answered){b.addEventListener("click",function(){fn(i);});}
    return b;
  });
}

function mkFb(answered,sel,correct,cf,wf){
  if(!answered)return null;
  var ok=sel===correct;
  var d=document.createElement("div");
  d.className="fb "+(ok?"c":"w");
  d.innerHTML="<div class=\"fbt\">"+(ok?"&#10003; Correct":"&#10007; Incorrect")+"</div>"+(ok?cf:wf);
  return d;
}

function escHtml(v){
  return String(v==null?"":v).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\"/g,"&quot;");
}
function mkCard(html){var c=document.createElement("div");c.className="card";c.innerHTML=html;return c;}
function eqSet(a,b){if(a.length!==b.length)return false;for(var i=0;i<a.length;i++){if(b.indexOf(a[i])===-1)return false;}return true;}
function topActions(label){
  return "<div class=\"top-actions\"><div class=\"btn-row\"><button class=\"btn secondary nav-home-btn\" type=\"button\">Return to Menu</button></div><div class=\"hint\">"+label+"</div></div>";
}
function bindHomeButtons(scope){
  scope.querySelectorAll(".nav-home-btn").forEach(function(btn){
    btn.addEventListener("click",function(){nav("home");});
  });
}

function rPre(a){
  var q=PTQ[S.preQ],tot=PTQ.length;
  var c=mkCard(topActions("Your progress is saved automatically.")+"<div class=\"slabel\">Pre-Training Assessment &mdash; Question "+(S.preQ+1)+" of "+tot+"</div>"+
    "<div class=\"pbar-c\"><div class=\"pbar\" style=\"width:"+(S.preQ/tot*100)+"%\"></div></div>"+
    "<p style=\"font-size:13px;color:#5d7a9a;margin-bottom:18px\">Answer based on your current knowledge. No penalty for wrong answers &mdash; this establishes your baseline.</p>"+
    "<div class=\"question\">"+q.q+"</div><div class=\"options\" id=\"opts\"></div><div id=\"fb\"></div><div id=\"nb\"></div>");
  a.appendChild(c);
  bindHomeButtons(c);
  var og=c.querySelector("#opts");
  mkOpts(q.o,S.preAns,S.preSel,q.c,function(i){S.preSel=i;S.preAns=true;if(i===q.c&&!S.preAwarded[S.preQ]){S.preScore++;S.preAwarded[S.preQ]=true;}R();}).forEach(function(b){og.appendChild(b);});
  var fb=mkFb(S.preAns,S.preSel,q.c,q.e,q.e);if(fb)c.querySelector("#fb").appendChild(fb);
  if(S.preAns){var nb=document.createElement("button");nb.type="button";nb.className="btn";nb.textContent=S.preQ===tot-1?"Start Training Scenarios ->":"Next Question ->";nb.addEventListener("click",function(){S.preAns=false;S.preSel=null;if(S.preQ<PTQ.length-1){S.preQ++;}else{S.preOk=true;S.view="sc";S.scIdx=0;S.scQ=0;}R();});c.querySelector("#nb").appendChild(nb);}
}

function rRf(a){
  var ex=RF[S.rfIdx],tot=RF.length;
  var c=mkCard(topActions("You can leave and resume this drill later.")+"<div class=\"slabel\">Spot the Red Flag &mdash; Drill "+(S.rfIdx+1)+" of "+tot+"</div>"+
    "<div class=\"pbar-c\"><div class=\"pbar\" style=\"width:"+(S.rfIdx/tot*100)+"%\"></div></div>"+
    "<div class=\"mini-stats\"><div class=\"mini-stat\"><strong>"+totalPoints()+"</strong><span>Total points</span></div><div class=\"mini-stat\"><strong>"+S.rfScore+"/"+tot+"</strong><span>Drills solved</span></div></div>"+
    "<h1>"+ex.title+"</h1><p>"+ex.intro+"</p><div class=\"flag-key\"><div class=\"flag-card\"><h3>Task</h3><p style=\"margin:0\">Select every suspicious line. You only score when all risky lines are identified correctly.</p></div><div class=\"flag-card\"><h3>Context</h3><p style=\"margin:0\">"+ex.context+"</p></div></div><div class=\"flag-list\" id=\"flagList\"></div><div id=\"rfb\"></div><div id=\"rnb\"></div>");
  a.appendChild(c);
  bindHomeButtons(c);
  var list=c.querySelector("#flagList");
  ex.lines.forEach(function(line,idx){
    var b=document.createElement("button");
    b.type="button";
    var sel=S.rfSel.indexOf(idx)!==-1;
    var cls="flag-line"+(sel?" sel":"");
    if(S.rfAns){
      cls="flag-line";
      if(ex.flags.indexOf(idx)!==-1)cls+=" good";
      else if(sel)cls+=" bad";
      else cls+=" dim";
      if(ex.flags.indexOf(idx)!==-1&&S.rfSel.indexOf(idx)===-1)cls+=" missed";
    }
    b.className=cls;
    b.textContent=line;
    if(!S.rfAns){b.addEventListener("click",function(){if(sel)S.rfSel=S.rfSel.filter(function(v){return v!==idx;});else S.rfSel=S.rfSel.concat(idx).sort();R();});}
    list.appendChild(b);
  });
  var rfb=c.querySelector("#rfb");
  if(S.rfAns){
    var ok=eqSet(S.rfSel,ex.flags);
    var correctHits=S.rfSel.filter(function(idx){return ex.flags.indexOf(idx)!==-1;}).length;
    var wrongHits=S.rfSel.filter(function(idx){return ex.flags.indexOf(idx)===-1;}).length;
    var missedHits=ex.flags.filter(function(idx){return S.rfSel.indexOf(idx)===-1;}).length;
    var strip=document.createElement("div");
    strip.className="result-strip";
    strip.innerHTML="<span class=\"result-chip correct\">Correct flags: "+correctHits+"</span><span class=\"result-chip wrong\">Incorrect selections: "+wrongHits+"</span><span class=\"result-chip missed\">Missed flags: "+missedHits+"</span>";
    rfb.appendChild(strip);
    var fb=document.createElement("div");
    fb.className="fb "+(ok?"c":"w");
    fb.innerHTML="<div class=\"fbt\">"+(ok?"Perfect identification":"Review the missed signals")+"</div>"+ex.explain+(ok?" You earned 75 points for this drill.":" Compare your selections with the highlighted lines and try to explain why each one matters.");
    rfb.appendChild(fb);
  }else{
    var submit=document.createElement("button");
    submit.type="button";
    submit.className="btn";
    submit.textContent="Submit Flags";
    submit.disabled=!S.rfSel.length;
    if(!S.rfSel.length)submit.style.opacity=".5";
    submit.addEventListener("click",function(){
      S.rfAns=true;
      if(eqSet(S.rfSel,ex.flags)&&!S.rfAwarded[S.rfIdx]){S.rfScore++;S.rfAwarded[S.rfIdx]=true;}
      R();
    });
    c.querySelector("#rnb").appendChild(submit);
  }
  if(S.rfAns){
    var nb=document.createElement("button");
    nb.type="button";
    nb.className="btn";
    nb.textContent=S.rfIdx===tot-1?"Choose Next Step ->":"Next Drill ->";
    nb.addEventListener("click",function(){
      S.rfSel=[];
      S.rfAns=false;
      if(S.rfIdx<tot-1){S.rfIdx++;}
      else{S.rfOk=true;S.view="next";}
      window.scrollTo(0,0);
      R();
    });
    c.querySelector("#rnb").appendChild(nb);
  }
}

function rNext(a){
  var remainingSim=!S.simOk;
  var remainingPost=!(S.postOk&&S.fbOk);
  var intro=mkCard(topActions("Choose what you want to complete next. Both remaining sections must be completed before the final results page unlocks.")+
    "<div class=\"slabel\">Choose Your Next Step</div><h1>What would you like to do next?</h1>"+
    "<p>You have completed the red flag drills. From here, you can continue with the branching exercise or move directly into the post-test and feedback.</p>"+
    "<div class=\"twocol\">"+
    "<div class=\"infocard\"><h3>Branching Exercise</h3><p>Work through the adaptive scenario and see how earlier decisions shape the outcome.</p><div class=\"btn-row\"><button class=\"btn\" id=\"nextToSim\" "+(remainingSim?"":"disabled")+">"+(remainingSim?"Continue to Branching Exercise ->":"Branching Exercise Completed")+"</button></div></div>"+
    "<div class=\"infocard\"><h3>Post-Test + Feedback</h3><p>Repeat the assessment, then rate the training and leave any comments.</p><div class=\"btn-row\"><button class=\"btn secondary\" id=\"nextToPost\" "+(remainingPost?"":"disabled")+">"+(remainingPost?"Continue to Post-Test + Feedback ->":"Post-Test + Feedback Completed")+"</button></div></div>"+
    "</div><div class=\"feedback-note\">If you complete one of these now, the module will guide you to the remaining final step afterwards.</div>");
  a.appendChild(intro);
  bindHomeButtons(intro);
  var toSim=intro.querySelector("#nextToSim");
  var toPost=intro.querySelector("#nextToPost");
  if(toSim&&!toSim.disabled)toSim.addEventListener("click",openSimulation);
  if(toPost&&!toPost.disabled)toPost.addEventListener("click",function(){nav(S.postOk&&!S.fbOk?"feed":"post");});
}

function rSc(a){
  var s=SC[S.scIdx],q=s.qs[S.scQ],tot=SC.length;
  if(S.scQ===0&&!S.scAns){
    var body=s.body.map(function(l){return l?"<p style=\"margin-bottom:5px\">"+l+"</p>":"<br>";}).join("");
    var intro=mkCard(topActions("Return to the menu at any time without losing progress.")+"<div class=\"scenario-top\"><div><div class=\"slabel\">Training Scenarios &mdash; "+(S.scIdx+1)+" of "+tot+"</div><span class=\"tag\">&#9888; "+s.at+"</span></div><div class=\"meta-row\"><span class=\"meta-chip\">Scenario "+(S.scIdx+1)+" of "+tot+"</span><span class=\"meta-chip\">2 questions</span></div></div>"+
      "<div class=\"pbar-c\"><div class=\"pbar\" style=\"width:"+(S.scIdx/tot*100)+"%\"></div></div>"+
      "<h1>"+s.title+"</h1><p>"+s.setup+"</p>"+
      "<div class=\"sbox\"><div class=\"from\">"+s.from+"</div>"+body+"</div>");
    // Mobile collapsible scenario card
  var togBtn=document.createElement("button");
  togBtn.className="sc-intro-toggle";
  togBtn.type="button";
  togBtn.innerHTML="<span>&#128203; View Scenario Details</span><span class=\"tog-arrow\">&#9660;</span>";
  var wrap=document.createElement("div");
  wrap.className="sc-intro-wrap";
  wrap.appendChild(intro);
  a.appendChild(togBtn);
  a.appendChild(wrap);
  bindHomeButtons(intro);
  togBtn.addEventListener("click",function(){
    var isOpen=wrap.classList.contains("open");
    wrap.classList.toggle("open",!isOpen);
    togBtn.classList.toggle("open",!isOpen);
    togBtn.querySelector("span:first-child").textContent=isOpen?"📋 View Scenario Details":"📋 Hide Scenario Details";
  });
  }
  var qc=mkCard((S.scQ===0&&!S.scAns?"":"<div class=\"top-actions\"><div class=\"btn-row\"><button class=\"btn secondary nav-home-btn\" type=\"button\">Return to Menu</button></div><div class=\"hint\">You can go back to the menu between questions too.</div></div>")+"<div class=\"qnum\">"+q.n+"</div><div class=\"question\">"+q.q+"</div>"+
    "<div class=\"options\" id=\"sopts\"></div><div id=\"sfb\"></div><div id=\"snb\"></div>");
  a.appendChild(qc);
  bindHomeButtons(qc);
  var og=qc.querySelector("#sopts");
  mkOpts(q.o,S.scAns,S.scSel,q.c,function(i){var key=S.scIdx+"-"+S.scQ;S.scSel=i;S.scAns=true;if(i===q.c&&!S.scAwarded[key]){S.scScore++;S.scAwarded[key]=true;}R();}).forEach(function(b){og.appendChild(b);});
  var fb=mkFb(S.scAns,S.scSel,q.c,q.cf,q.wf);if(fb)qc.querySelector("#sfb").appendChild(fb);
  if(S.scAns&&S.scQ===1){var wd=document.createElement("div");wd.className="why";wd.innerHTML="<div class=\"whyt\">&#128161; Why this is tricky:</div>"+s.why;qc.querySelector("#sfb").appendChild(wd);}
  if(S.scAns){
    var isLQ=S.scQ===s.qs.length-1,isLS=S.scIdx===tot-1;
    var nb=document.createElement("button");nb.type="button";nb.className="btn";
    nb.textContent=!isLQ?"Next Question ->":(isLS?"Proceed to Red Flag Drills ->":"Next Scenario ->");
    nb.addEventListener("click",function(){
      S.scAns=false;S.scSel=null;
      if(S.scQ<s.qs.length-1){S.scQ++;}
      else if(S.scIdx<SC.length-1){S.scIdx++;S.scQ=0;}
      else{S.scOk=true;S.view="rf";S.rfIdx=0;S.rfSel=[];S.rfAns=false;}
      window.scrollTo(0,0);R();
    });
    qc.querySelector("#snb").appendChild(nb);
  }
}

function rPost(a){
  var q=PTQ[S.postQ],tot=PTQ.length;
  var c=mkCard(topActions("You can return to the menu and continue later.")+"<div class=\"slabel\">Post-Training Assessment &mdash; Question "+(S.postQ+1)+" of "+tot+"</div>"+
    "<div class=\"pbar-c\"><div class=\"pbar\" style=\"width:"+(S.postQ/tot*100)+"%\"></div></div>"+
    "<p style=\"font-size:13px;color:#5d7a9a;margin-bottom:18px\">Now answer the same questions again after completing the training and branching exercise.</p>"+
    "<div class=\"question\">"+q.q+"</div><div class=\"options\" id=\"popts\"></div><div id=\"pfb\"></div><div id=\"pnb\"></div>");
  a.appendChild(c);
  bindHomeButtons(c);
  var og=c.querySelector("#popts");
  mkOpts(q.o,S.postAns,S.postSel,q.c,function(i){S.postSel=i;S.postAns=true;if(i===q.c&&!S.postAwarded[S.postQ]){S.postScore++;S.postAwarded[S.postQ]=true;}R();}).forEach(function(b){og.appendChild(b);});
  var fb=mkFb(S.postAns,S.postSel,q.c,q.e,q.e);if(fb)c.querySelector("#pfb").appendChild(fb);
  if(S.postAns){var nb=document.createElement("button");nb.type="button";nb.className="btn";nb.textContent=S.postQ===tot-1?"Continue to Feedback ->":"Next Question ->";nb.addEventListener("click",function(){S.postAns=false;S.postSel=null;if(S.postQ<PTQ.length-1){S.postQ++;}else{S.postOk=true;S.view="feed";}R();});c.querySelector("#pnb").appendChild(nb);}

function feedbackStars(value,onSelect){
  var wrap=document.createElement("div");
  wrap.className="star-row";
  for(var i=1;i<=5;i++){
    (function(score){
      var b=document.createElement("button");
      b.type="button";
      b.className="star-btn"+(score<=value?" on":"");
      b.setAttribute("aria-label",score+" star"+(score>1?"s":""));
      b.innerHTML="&#9733;";
      b.addEventListener("click",function(){onSelect(score);});
      wrap.appendChild(b);
    })(i);
  }
  return wrap;
}

function rFeedback(a){
  var ready=S.fbEngage>0&&S.fbReal>0&&S.fbConf>0;
  var feedbackLead=!S.simOk?"Please share your feedback, then continue to the branching exercise.":(S.emailSent?"Your feedback and results have already been submitted. You can now view the final results.":"Please send in your feedback and results before viewing the final results.");
  var actionLabel=!S.simOk?"Save Feedback and Continue ->":(S.emailSent?"View Final Results ->":"Send In Results and View Results ->");
  var actionDisabled=!ready;
  var c=mkCard(topActions(feedbackLead)+
    "<div class=\"slabel\">Post-Training Feedback</div><h1>How did the training feel?</h1>"+
    "<p>Your feedback helps evaluate whether the module felt engaging, realistic, and useful.</p>"+
    "<div class=\"feedback-grid\" id=\"feedbackGrid\"></div>"+
    "<div class=\"feedback-card\"><h3>Any comments?</h3><p>Optional. Share anything that felt clear, confusing, realistic, or worth improving.</p><textarea class=\"comment-box\" id=\"fbComments\" placeholder=\"Write any comments here...\">"+escHtml(S.fbComments)+"</textarea><div class=\"feedback-note\">Comments are optional. The star ratings are required.</div></div>"+
    (S.simOk?"<div class=\"email-status\" id=\"emailStatus\">"+(S.emailSent?"Your results have already been sent in.":"Click the button below to send in your results and unlock the final results page.")+"</div>":"<div class=\"feedback-note\">You can submit your final results after the branching exercise is complete.</div>")+
    "<div class=\"btn-row\"><button class=\"btn\" id=\"submitFeedback\" "+(actionDisabled?"disabled":"")+">"+actionLabel+"</button></div>");
  a.appendChild(c);
  bindHomeButtons(c);
  var grid=c.querySelector("#feedbackGrid");
  [
    {key:"fbEngage",label:"How engaging was the training?",value:S.fbEngage},
    {key:"fbReal",label:"How realistic did the scenarios feel?",value:S.fbReal},
    {key:"fbConf",label:"Do you feel more confident identifying social engineering attacks?",value:S.fbConf}
  ].forEach(function(item){
    var card=document.createElement("div");
    card.className="feedback-card";
    card.innerHTML="<h3>"+item.label+"</h3><p>Select a rating from 1 to 5 stars.</p>";
    card.appendChild(feedbackStars(item.value,function(score){
      S[item.key]=score;
      R();
    }));
    grid.appendChild(card);
  });
  var comments=c.querySelector("#fbComments");
  comments.addEventListener("input",function(){
    S.fbComments=comments.value;
    saveState();
  });
  c.querySelector("#submitFeedback").addEventListener("click",function(){
    if(!(S.fbEngage>0&&S.fbReal>0&&S.fbConf>0))return;
    S.fbOk=true;
    saveState();
    if(!S.simOk){
      nav("sim");
      return;
    }
    if(S.emailSent){
      nav("res");
      return;
    }
    sendResultsEmail("res");
  });
}

function rSim(a){
  var simNext=S.postOk?"feed":"post";
  var simLeadText=simNext==="feed"?"Complete this branching exercise to continue to the feedback form.":"Complete this branching exercise to continue to the post-test.";
  var simBtnText=simNext==="feed"?"Continue to Feedback ->":"Continue to Post-Test ->";
  var simDoneText=simNext==="feed"?"Branching exercise complete. You can continue to the feedback form.":"Branching exercise complete. You can continue to the post-test.";
  var simPendingText=simNext==="feed"?"Finish the branching exercise to continue to the feedback form.":"Finish the branching exercise to continue to the post-test.";
  var shell=mkCard(topActions(simLeadText)+
    "<div class=\"slabel\">Branching Exercise</div><h1>Branching Exercise</h1>"+
    "<p>This module activity places you in a short branching scenario that adapts to your decisions. It becomes available after the red flag drills and forms one of the final stages of the module.</p>"+
    "<p>Work through it to see how escalating pressure, persuasion, and poor verification habits can shape later outcomes.</p>"+
    "<div id=\"simulation-root\" class=\"sim-host\"></div><div class=\"btn-row\"><button class=\"btn\" id=\"simContinue\" "+(S.simOk?"":"disabled")+">"+simBtnText+"</button></div><div class=\"feedback-note\" id=\"simStatusNote\">"+(S.simOk?simDoneText:simPendingText)+"</div>");
  a.appendChild(shell);
  bindHomeButtons(shell);
  shell.querySelector("#simContinue").addEventListener("click",function(){
    if(!S.simOk)return;
    nav(simNext);
  });
  var host=shell.querySelector("#simulation-root");
  host.addEventListener("simulation-status",function(ev){
    if(!ev.detail)return;
    if(ev.detail.isComplete){
      S.simOk=true;
      saveState();
      var btn=shell.querySelector("#simContinue");
      var note=shell.querySelector("#simStatusNote");
      if(btn)btn.disabled=false;
      if(note)note.textContent=simDoneText;
    }
  });
  if(typeof initSimulation==="function"){initSimulation("simulation-root");}
  else{
    host.innerHTML="<div class=\"card\" style=\"margin:0;padding:22px\"><p style=\"margin:0;color:#922b21\">Simulation module failed to load.</p></div>";
  }
}

function rRes(a){
  if(!(S.simOk&&S.postOk&&S.fbOk&&S.emailSent)){nav(currentStep());return;}
  var tot=PTQ.length,pre=Math.round(S.preScore/tot*100),post=Math.round(S.postScore/tot*100),d=post-pre,pts=totalPoints();
  var dcls=d>0?"imp":d<0?"neg":"neu",dl=(d>0?"+":"")+d+"%";
  var msg=d>=30?"Excellent improvement. The training has made a significant impact on your ability to identify social engineering threats.":
    d>=15?"Good improvement. You have developed a stronger awareness of social engineering tactics.":
    d>=0?"Your awareness has been maintained or slightly improved. Reviewing the scenario feedback will strengthen your understanding further.":
    "Your post-test score was lower than your pre-test. Review the feedback from each scenario and consider repeating the training.";
  a.appendChild(mkCard("<div class=\"slabel\">Training Complete</div><h1>Your Results</h1>"+
    "<p>Here is a summary of your awareness before and after completing the training module.</p>"+
    "<div class=\"scores\"><div class=\"scard\"><div class=\"snum\">"+pre+"%</div><div class=\"slbl\">Pre-Training</div></div>"+
    "<div class=\"scard\"><div class=\"snum\">"+post+"%</div><div class=\"slbl\">Post-Training</div></div>"+
    "<div class=\"scard\"><div class=\"snum "+dcls+"\">"+dl+"</div><div class=\"slbl\">Improvement</div></div>"+
    "<div class=\"scard\"><div class=\"snum\">"+pts+"</div><div class=\"slbl\">Points</div></div></div>"+
    "<div class=\"rmsg\"><p style=\"margin:0\">"+msg+"</p></div>"+
    "<div class=\"score-band\"><div class=\"score-pill\">Scenario points: "+(S.scScore*100)+"</div><div class=\"score-pill\">Red flag points: "+(S.rfScore*75)+"</div><div class=\"score-pill\">Post-test points: "+(S.postScore*50)+"</div><div class=\"score-pill\">Branching exercise: "+(S.simOk?50:0)+"</div><div class=\"score-pill\">Completion bonus: "+(S.postOk?100:0)+"</div></div>"+
    "<hr class=\"divider\"><h2>Key Takeaways</h2><ul class=\"wlist\">"+
    "<li><span>&#128269;</span><span>Always verify banking detail changes by calling a known number &mdash; never via the suspicious email itself</span></li>"+
    "<li><span>&#9208;</span><span>Urgency is a manipulation tactic &mdash; pause before acting on any time-pressured request</span></li>"+
    "<li><span>&#128245;</span><span>Never approve MFA requests you did not initiate &mdash; report them immediately</span></li>"+
    "<li><span>&#128272;</span><span>Never share credentials or bypass access controls, even to help a colleague</span></li>"+
    "<li><span>&#128222;</span><span>Verify executive financial instructions through known internal channels &mdash; voices can be faked</span></li>"+
    "<li><span>&#128279;</span><span>Access documents through official internal systems &mdash; not links in emails or calendar invites</span></li></ul>"+
    "<hr class=\"divider\"><div class=\"infocard\" style=\"margin-bottom:16px\"><h3>Submission Complete</h3><p style=\"margin:0;color:#48637f\">Your scores and feedback have been sent in. You can review your results below or repeat the module if needed.</p></div><div class=\"btn-row\"><button class=\"btn secondary\" id=\"redoEnd\">Redo Training</button><button class=\"btn secondary\" id=\"restartEnd\">Restart Module</button><button class=\"btn secondary\" id=\"homeEnd\">Return to Home</button></div><p style=\"font-size:13px;color:#5d7a9a;margin-top:14px\">Thank you for completing the Awareness Training module.</p>"));
  document.getElementById("redoEnd").addEventListener("click",redoTraining);
  document.getElementById("restartEnd").addEventListener("click",resetState);
  document.getElementById("homeEnd").addEventListener("click",function(){nav("home");});
}

document.getElementById("themeToggle").addEventListener("click",toggleTheme);
loadTheme();
initEmailJs();
loadState();
R();
